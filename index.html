<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter | Task 01</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: #1f2937; }

    .page {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff; border-radius: 14px; padding: 32px;
      width: 100%; max-width: 480px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .header { text-align: center; margin-bottom: 24px; }
    .badge {
      display: inline-block; background: #eef2ff; color: #4338ca;
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .header h1 { margin: 12px 0 6px; font-size: 26px; color: #111827; }
    .subtitle { margin: 0; color: #6b7280; font-size: 14px; }

    .form { display: flex; flex-direction: column; gap: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .field input {
      width: 100%; padding: 12px 14px; font-size: 15px;
      border: 1px solid #d1d5db; border-radius: 8px; outline: none;
    }
    .field input:focus { border-color: #4338ca; box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15); }

    .unit-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .unit-btn {
      padding: 10px 6px; background: #f3f4f6; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 13px; color: #374151; cursor: pointer;
    }
    .unit-btn:hover { background: #e5e7eb; }
    .unit-btn.active { background: #4338ca; color: #fff; border-color: #4338ca; }

    .actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn { flex: 1; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; }
    .btn.primary { background: #4338ca; color: #fff; }
    .btn.primary:hover { background: #3730a3; }
    .btn.ghost { background: #f3f4f6; color: #374151; }
    .btn.ghost:hover { background: #e5e7eb; }

    .error {
      margin-top: 16px; padding: 10px 12px;
      background: #fef2f2; color: #b91c1c;
      border: 1px solid #fecaca; border-radius: 8px; font-size: 14px;
    }

    .results { margin-top: 22px; padding-top: 18px; border-top: 1px solid #e5e7eb; }
    .results h3 { margin: 0 0 12px; font-size: 16px; color: #111827; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .result-item {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px 8px; text-align: center;
      display: flex; flex-direction: column; gap: 6px;
    }
    .result-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .result-value { font-size: 16px; font-weight: 700; color: #111827; }

    .footer { margin-top: 22px; color: rgba(255,255,255,0.7); font-size: 12px; text-align: center; }

    @media (max-width: 480px) {
      .card { padding: 22px; }
      .unit-group { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <span class="badge">Task 01</span>
        <h1>Temperature Converter</h1>
        <p class="subtitle">Convert between Celsius, Fahrenheit and Kelvin.</p>
      </div>

      <form id="convertForm" class="form">
        <div class="field">
          <label for="tempInput">Temperature value</label>
          <input type="text" id="tempInput" placeholder="e.g. 25" />
        </div>

        <div class="field">
          <label>From unit</label>
          <div class="unit-group">
            <button type="button" class="unit-btn active" data-unit="C">Celsius (°C)</button>
            <button type="button" class="unit-btn" data-unit="F">Fahrenheit (°F)</button>
            <button type="button" class="unit-btn" data-unit="K">Kelvin (K)</button>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn primary">Convert</button>
          <button type="button" id="resetBtn" class="btn ghost">Reset</button>
        </div>
      </form>

      <div id="errorBox" class="error" style="display:none;"></div>

      <div id="resultBox" class="results" style="display:none;">
        <h3>Results</h3>
        <div class="result-grid">
          <div class="result-item" id="resC">
            <span class="result-label">Celsius</span>
            <span class="result-value">-</span>
          </div>
          <div class="result-item" id="resF">
            <span class="result-label">Fahrenheit</span>
            <span class="result-value">-</span>
          </div>
          <div class="result-item" id="resK">
            <span class="result-label">Kelvin</span>
            <span class="result-value">-</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      Made by Mansi — Prodigy InfoTech Software Development Internship — Task 01
    </footer>
  </div>

  <script>
    // Task 01 - Temperature Converter
    // Author: Mansi (B.Tech)
    // Logic: take input value + its unit, then convert to the other two units.

    let selectedUnit = "C";

    const tempInput = document.getElementById("tempInput");
    const form = document.getElementById("convertForm");
    const resetBtn = document.getElementById("resetBtn");
    const errorBox = document.getElementById("errorBox");
    const resultBox = document.getElementById("resultBox");
    const unitButtons = document.querySelectorAll(".unit-btn");

    unitButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        unitButtons.forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        selectedUnit = btn.getAttribute("data-unit");
      });
    });

    function round2(num) { return Math.round(num * 100) / 100; }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
      resultBox.style.display = "none";
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function showResults(c, f, k) {
      document.querySelector("#resC .result-value").textContent = round2(c) + " °C";
      document.querySelector("#resF .result-value").textContent = round2(f) + " °F";
      document.querySelector("#resK .result-value").textContent = round2(k) + " K";
      resultBox.style.display = "block";
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      hideError();

      const raw = tempInput.value.trim();
      if (raw === "") { showError("Please enter a temperature value."); return; }

      const value = parseFloat(raw);
      if (isNaN(value)) { showError("Please enter a valid number."); return; }

      let celsius = 0, fahrenheit = 0, kelvin = 0;

      if (selectedUnit === "C") {
        celsius = value;
        fahrenheit = (value * 9) / 5 + 32;
        kelvin = value + 273.15;
      } else if (selectedUnit === "F") {
        celsius = ((value - 32) * 5) / 9;
        fahrenheit = value;
        kelvin = celsius + 273.15;
      } else if (selectedUnit === "K") {
        celsius = value - 273.15;
        fahrenheit = (celsius * 9) / 5 + 32;
        kelvin = value;
      }

      // cannot be below absolute zero (0 K)
      if (kelvin < 0) {
        showError("Temperature is below absolute zero, that's not possible.");
        return;
      }

      showResults(celsius, fahrenheit, kelvin);
    });

    resetBtn.addEventListener("click", function () {
      tempInput.value = "";
      hideError();
      resultBox.style.display = "none";
      unitButtons.forEach(function (b) { b.classList.remove("active"); });
      unitButtons[0].classList.add("active");
      selectedUnit = "C";
    });
  </script>
</body>
</html>
